<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>FlashLearn{% block title %}{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body class="bg-body-tertiary">
        <nav class="navbar navbar-expand-md navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">⚡ FlashLearn</a>
                <div class="ms-auto">
                    {% if session.get("user_id") %}
                        <span class="navbar-text text-white me-3">{{ session.get("username") }}</span>
                        <a class="btn btn-outline-light btn-sm" href="/logout">Log out</a>
                    {% else %}
                        <a class="btn btn-outline-light btn-sm" href="/login">Log in</a>
                        <a class="btn btn-light btn-sm" href="/register">Register</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main class="container py-4">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-info">{{ messages | join(" ") }}</div>
                {% endif %}
            {% endwith %}
            {% block main %}{% endblock %}
        </main>
    </body>
</html>
