{% extends "layout.html" %}
{% block title %} · Register{% endblock %}
{% block main %}
<h1 class="h3 mb-4">Create an account</h1>
<form method="post" action="/register" class="col-md-5">
    <div class="mb-3"><input class="form-control" name="username" placeholder="Username" autofocus></div>
    <div class="mb-3"><input class="form-control" name="password" type="password" placeholder="Password"></div>
    <div class="mb-3"><input class="form-control" name="confirmation" type="password" placeholder="Confirm password"></div>
    <button class="btn btn-primary">Register</button>
</form>
{% endblock %}
